<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новини | AI News Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Стильний темний банер */
        .news-hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            padding: 80px 0;
            position: relative;
            border-bottom: 3px solid #0d6efd;
        }

        /* Анімація та стилі для карток */
        .news-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none !important;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .news-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.12) !important;
        }

        .news-img-wrapper {
            height: 220px;
            overflow: hidden;
            background-color: #1e293b; /* темний фон, якщо картинка вантажиться */
        }

        .news-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .news-card:hover .news-img {
            transform: scale(1.04);
        }

        /* Кастомні бейджі для категорій */
        .badge-ai {
            background-color: rgba(13, 110, 253, 0.15);
            color: #0d6efd;
            font-weight: 600;
        }

        .badge-robot {
            background-color: rgba(25, 135, 84, 0.15);
            color: #198754;
            font-weight: 600;
        }

        /* Округлі перемикачі вкладок */
        .nav-pills .nav-link {
            color: #475569;
            font-weight: 500;
            border-radius: 50px;
            transition: all 0.2s ease;
        }

        .nav-pills .nav-link.active {
            background-color: #0d6efd;
            color: white;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.25);
        }

        /* Оформлення тексту великої статті */
        .modal-article-content p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #334155;
            margin-bottom: 1.5rem;
            text-align: justify;
        }
    </style>
</head>
<body>

    <header class="bg-dark text-white sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark container">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html"><span class="text-gradient">AI.Portal</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про сайт</a></li>

                        <li class="nav-item"><a class="nav-link" href="gallery.html">Галерея</a></li>

                    </ul>

    <section class="news-hero text-center text-white d-flex align-items-center justify-content-center">
        <div class="container">
            <h1 class="display-3 fw-bold mb-3" style="text-shadow: 0 4px 10px rgba(0,0,0,0.7);">Світ Новин</h1>
            <p class="lead mb-0 fs-4" style="max-width: 800px; margin: 0 auto; text-shadow: 0 2px 6px rgba(0,0,0,0.6);">
                25 масштабних розслідувань, проривів та аналітичних статей у сфері ШІ та робототехніки
            </p>
        </div>
    </section>

    <main class="container my-5">
        <ul class="nav nav-pills justify-content-center gap-2 mb-5" id="newsTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active px-4 py-2" id="all-tab" data-bs-toggle="pill" data-bs-target="#all-news" type="button">Всі новини</button>
            </li>
            <li class="nav-item">
                <button class="nav-link px-4 py-2" id="ai-tab" data-bs-toggle="pill" data-bs-target="#ai-news" type="button">Генеративний ШІ</button>
            </li>
            <li class="nav-item">
                <button class="nav-link px-4 py-2" id="robot-tab" data-bs-toggle="pill" data-bs-target="#robot-news" type="button">Робототехніка</button>
            </li>

        <div class="tab-content" id="newsTabsContent">
            <div class="tab-pane fade show active" id="all-news" role="tabpanel">

            </div>

            </div>

    <div class="modal fade" id="articleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-lg">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header bg-dark text-white p-4">
                    <div>
                        <span class="badge bg-primary mb-2 px-3 py-1 rounded-pill" id="modalBadge">Категорія</span>
                        <h4 class="modal-title fw-bold" id="modalTitle">Заголовок</h4>
                        <small class="text-muted d-block mt-1" id="modalDate">Дата</small>
                    </div>
                    <button type="button" class="btn-close btn-close-white align-self-start" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <img id="modalImg" src="" alt="Banner" class="img-fluid rounded-3 mb-4 w-100 shadow-sm" style="height: 400px; object-fit: cover;" onerror="handleImgError(this)">
                    <div class="modal-article-content" id="modalContent"></div>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Закрити статтю</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-1">© 2026 Інформационный портал «Новини штучного інтелекту».</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Функція страховки: якщо картинка не завантажилася, створюємо гарний CSS-градієнт замість неї
        function handleImgError(image) {
            image.onerror = null; // запобігаємо зацикленню
            image.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='450' viewBox='0 0 800 450'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%231e293b;stop-opacity:1' /><stop offset='100%' style='stop-color:%230f172a;stop-opacity:1' /></linearGradient></defs><rect width='100%' height='100%' fill='url(%23g)'/><text x='50%' y='50%' font-family='Arial, sans-serif' font-size='24' fill='%230d6efd' font-weight='bold' text-anchor='middle' dominant-baseline='middle'>AI &amp; ROBOTICS TECHNOLOGY</text></svg>";
        }

        function openArticle(index) {
            const article = newsData[index];
            const catText = article.type === 'ai' ? 'Генеративний ШІ' : 'Робототехніка';
            
            document.getElementById('modalTitle').innerText = article.title;
            document.getElementById('modalBadge').innerText = catText;
            document.getElementById('modalDate').innerText = 'Дата публікації: ' + article.date;
            document.getElementById('modalImg').src = article.img;
            document.getElementById('modalContent').innerHTML = article.full;

            const badge = document.getElementById('modalBadge');
            if(article.type === 'ai') {
                badge.className = 'badge bg-primary mb-2 px-3 py-1 rounded-pill';
            } else {
                badge.className = 'badge bg-success mb-2 px-3 py-1 rounded-pill';
            }

            let myModal = new bootstrap.Modal(document.getElementById('articleModal'));
            myModal.show();
        }

        // База даних із 25 великими статтями та стабільними ID картинок
        const newsData = [
            {
                type: 'ai',
                date: '03.06.2026',
                img: 'https://picsum.photos/id/180/800/500',
                title: 'Революція у програмуванні: нові LLM моделі пишуть складний продуктовий код без помилок',
                short: 'Розробники презентували мовні моделі, що автоматично знаходять баги та оптимізують логічні структури на рівні Senior.',
                full: '<p>Сьогодні провідні світові лабораторії штучного інтелекту офіційно представили нову архітектуру великих мовних моделей, яка орієнтована на повну автоматичну верифікацію програмного коду без залучення людини. Попередні версії асистентів часто страждали від так званих "галюцинацій" і видавали код, який вимагав тривалого налагодження та рефакторингу. Нове покоління повністю усуває цю проблему за допомогою вбудованого математичного ядра перевірки.</p><p>Головною особливістю цієї моделі став інтегрований ізольований компілятор. Перед тим як вивести готовий фрагмент коду користувачу в чат-вікно, нейромережа запускає внутрішній цикл стрес-тестування, симулюючи високе навантаження та перевіряючи алгоритми на наявність логічних помилок або дірок у кібербезпеці. Якщо підсистема знаходить бодай найменшу затримку в мілісекундах або потенційний витік пам\'яті, вона автоматично переписує структуру з нуля.</p><p>На етапі закритого бета-тестування ШІ зміг безпомилково написати повну мікросервісну архітектуру для високонавантаженої банківської системи та провести автоматичний рефакторинг застарілого коду великого інтернет-порталу, підвищивши швидкість обробки запитів на рекордні 42%. Експерти одностайно стверджують, що дана технологія кардинально змінить індустрію розробки програмного забезпечення в найближчі два роки, змістивши фокус інженерів з написання рутинних функцій на глобальне високорівневе проектування комплексних інтелектуальних систем.</p>'
            },
            {
                type: 'robot',
                date: '02.06.2026',
                img: 'https://picsum.photos/id/201/800/500',
                title: 'Андроїди на виробництві: великі автомобільні фабрики переходять на автономні платформи',
                short: 'Провідні світові автоконцерни розпочали масштабне інтегрування гуманоїдних роботів на конвеєрних лініях.',
                full: '<p>Складальні заводах найбільших європейських та американських автомобільних гігантів оголосили про завершення пілотних випробувань та успішну інтеграцію першої великої промислової сотні людиноподібних роботів-андроїдів до своїх основних конвеєрних ліній. Це знаменує початок нової ери в автоматизації важкої промисловості, де машини замінюють людей на найбільш монотонних та шкідливих ділянках.</p><p>Нові андроїди виконують складні завдання, пов\'язані з високим фізичним навантаженням на опорно-руховий апарат, такі як встановлення важких елементів трансмісії, зварювання внутрішніх каркасів у важкодоступних місцях та перенесення акумуляторних блоків у цехах з підвищеним рівнем шуму і хімічного випаровування, де людська праця потребує жорстких обмежень за часом. Швидкість їхньої роботи залишається незмінною впродовж 24 годин на добу, вимагаючи лише короткої 15-хвилинної сесії швидкої підзарядки кожні шість годин.</p><p>Завдяки новітнім сенсорам штучного тактильного зв\'язку та інтегрованим алгоритмам просторового орієнтування, андроїди здатні безпечно працювати пліч-о-пліч з людьми-операторами, повністю виключаючи випадкові зіткнення чи виробничий травматизм. Головні інженери автомобільних ліній заявляють, що використання роботів дозволило стабілізувати загальну швидкість збірки вузлів, а також знизити кількість браку через втому людського фактору практично до абсолютного нуля.</p>'
            },
            {
                type: 'ai',
                date: '31.05.2026',
                img: 'https://picsum.photos/id/160/800/500',
                title: 'Штучний інтелект навчився створювати реалістичні 3D-світи за лічені секунди',
                short: 'Новий революційний алгоритм дифузії дозволяє генерувати деталізовані тривимірні локації для ігор за текстовим описом.',
                full: '<p>Індустрія розробки комп\'ютерних ігор та віртуальної реальності переживає колосальний технологічний стрибок, порівнянний з появою перших 3D-прискорювачів. Представлена розробниками нейромережа нового покоління здатна за лічені секунди створювати повноцінні безшовні тривимірні ігрові локації на основі звичайного текстового опису або грубих двовимірних начерків олівцем.</p><p>Система не просто зшиває готові тривимірні модели з бази даних, вона повністю розраховує геометрію кожного окремого об\'єкта з нуля, накладає реалістичні текстури надвисокої роздільної здатності (до 8К) та створює динамічну карту глобального освітлення з урахуванням законів реальної фізики. ШІ враховує те, як світло проходить крізь листя дерев, як утворюються заломлення у воді та як поширюються звукові хвилі у закритих печерах чи величезних залах.</p><p>Для ігрових студій це означає повну зміну пайплайну розробки. Більше не потрібно витрачати місяці роботи великих команд художників на моделювання кожної окремої кімнати чи лісового масиву — ШІ генерує відкритий світ прямо під час проектування, що дозволить навіть невеликим інді-розробникам створювати масштабні ААА-проекти з мінімальним бюджетом.</p>'
            },
            {
                type: 'robot',
                date: '29.05.2026',
                img: 'https://picsum.photos/id/0/800/500',
                title: 'Промислові маніпулятори отримали інтегрований високошвидкісний комп\'ютерний зір',
                short: 'Штучний інтелект інтегрували безпосередньо в конвеєрні механічні руки для миттєвого виявлення мікродефектів.',
                full: '<p>Нова серія промислових маніпуляторів, що використовуються на заводах важкої та точної електроніки, зазнала кардинальної модернізації на програмному та апаратному рівнях. Камери високої чіткості із надшвидкими матрицями, розташовані безпосередньо на рухомих вузлах робота, тепер підключені до локальних нейромережевих обчислювачів, які працюють без затримок мережі.</p><p>Завдяки цьому оновленню механічний маніпулятор здатний на льоту розпізнавати точну тривимірну форму, мікротріщини, внутрішні пустоти та будь-які найменші дефекти деталей, які рухаються конвеєрною стрічкою зі швидкістю до 5 метрів за секунду. Система не просто фіксує брак, вона самостійно аналізує причину його появи.</p><p>Якщо деталі лежать під неправильним кутом або змістилися під час транспортування, інтелектуальний маніпулятор миттєво перебудовує траєкторію руху своєї "руки", підлаштовуючись під нові умови за наносекунди. Це дозволило повністю ліквідувати незаплановані зупинки на пакувальних та зварювальних ділянках фабрик, суттєво підвищивши загальну маржинальність виробництва.</p>'
            },
            {
                type: 'ai',
                date: '27.05.2026',
                img: 'https://picsum.photos/id/60/800/500',
                title: 'Мультимодальні асистенти: ШІ тепер одночасно бачить, чує та розмовляє з користувачем',
                short: 'Велике глобальне оновлення мовних моделей дозволило користувачам спілкуватися з ШІ природним голосом без затримок.',
                full: '<p>Провідні ІТ-корпорації представили світові першу повністю нативну мультимодальну нейромережу. На відміну від попередніх систем, які працювали за триступеневим принципом (перетворення голосу в текст, обробка тексту мовною моделлю, а потім озвучування відповіді), новий ШІ обробляет аудіосигнал, живий відеопотік та текстові масиви єдиним наскрізним потоком даних.</p><p>Це технологічне рішення дозволило досягти нульової затримки у розмові: ШІ відповідає миттєво, вміє розпізнавати сарказм, тонкі відтінки гумору та перебивати співрозмовника до місця, якщо контекст розмови різко змінився. Нейромережа також аналізує емоційний стан людини за інтонацією її голосу та виразом обличчя через фронтальну камеру смартфона.</p><p>Сфера застосування таких асистентів безмежна: від миттєвого синхронного перекладу складних технічних переговорів між людьми, що розмовляють різними мовами, до створення повноцінних цифрових компаньйонів для підтримки людей похилого віку або навчання дітей у формі інтерактивної дружньої розмови.</p>'
            },
            {
                type: 'robot',
                date: '25.05.2026',
                img: 'https://picsum.photos/id/26/800/500',
                title: 'Автономна міська доставка: колісні роботи виїхали на вулиці великих мегаполісів',
                short: 'Великі логістичні компанії запустили повноцінний комерційний сервіс доставки дрібних вантажів за допомогою розумних роверів.',

            {

                full: '<p>Сучасні кіберзлочинці все частіше застосовують складні автоматизовані скрипти та нейромережі для генерації унікальних фішингових посилань та зламу банківських акаунтів. У відповідь на цю загрозу, провідні світові фінтех-організації розгорнули масштабну систему превентивного захисту на базі генеративного ШІ нового типу.</p><p>Система безперервно моделює мільйони варіантів потенційних хакерських атак на внутрішні сервери банку в реальному часі. Як тільки фіксується нетипова активність або спроба масового підбору паролів, ШІ миттєво створює унікальні цифрові бар\'єри, динамічно змінюючи архітектуру шифрування на ходу.</p><p>Для звичайних користувачів це означає абсолютну безпеку їхніх заощаджень. ШІ аналізує патерни поведінки власника картки (швидкість введення тексту, типові місця покупок, час активності) і блокує підозрілі транзакції за лічені мілісекунди до моменту списання коштів, вимагаючи додаткового біометричного підтвердження.</p>'

                full: '<p>Новітні розробки в галузі медичної біомеханіки дозволили запустити у серійне виробництво полегшені конструкції екзоскелетів для людей із серйозними травмами хребта та опорно-рухового апарату. Пристрій використовує унікальну матрицю нейрокомп\'ютерного інтерфейсу.</p><p>Високочутливі датчики, що кріпляться на тіло пацієнта, зчитують слабкі електричні імпульси, які мозок посилає до м\'язів ніг, навіть якщо сама м\'язова тканина частково атрофована. Штучний інтелект миттєво розпізнає намір людини зробити крок, сісти або повернутися і плавно приводить у дію високоточні сервоприводи на суглобах конструкції.</p><p>Реабілітологи відзначають дивовижні результати: завдяки інтелектуальному підсиленню пацієнти не просто отримують можливість пересуватися без сторонньої допомоги, а й набагато швидше відновлюють власні нервові зв\'язки, повертаючи чутливість кінцівок внаслідок регулярних тренувань.</p>'

                full: '<p>Міжнародна група вчених-біологів повідомила про успішне завершення глобального проекту з моделювання складних органічних сполук. Генеративні нейромережі проаналізували всі відомі структури амінокислот і змогли з точністю до атома передбачити просторову форму мільйона білків.</p><p>Раніше визначення форми лише одного білка в лабораторних умовах вимагало років складних рентгеноструктурних досліджень та мільйонних фінансових витрат. ШІ зробив цю роботу за кілька днів обчислень на серверах. Розуміння точної конфігурації білкових молекул відкриває прямий шлях до створення принципово нових ліків targeted-дії.</p><p>Фармацевтичні компанії тепер можуть проектувати молекули майбутніх медикаментів на комп\'ютері як деталі конструктора, ідеально підганяючи їх під структуру вірусів чи ракових клітин. Це скорочує цикл розробки та тестування нових ліків від небезпечних хвороб з традиційних десяти років до кількох тижнів.</p>'

                full: '<p>У провідному хірургічному інституті відбулася подія, яка назавжди змінить уявлення про високотехнологічну медицину. Новітній роботизований комплекс провів делікатне кардіологічне втручання практично без прямого втручання людини-хірурга.</p><p>Головний лікар лише контролював загальні життєві параметри пацієнта на моніторах та затверджував ключові етапи процедури за допомогою сенсорного інтерфейсу. Автоматизовані маніпулятори, оснащені надтонкими лазерними сканерами та мікроінструментами, самостійно компенсували природні рухи серця пацієнта та здійснювали надрізи судин з похибкою менше ніж 0.01 міліметра.</p><p>Завдяки використанню алгоритмів комп\'юторного зору, робот миттєво реагує на будь-які зміни тиску чи мікрокровотечі, коригуючи свої дії швидше, ніж це здатна зробити найдосвідченіша людина. Пацієнт був виписаний з клініки вже через два дні після операції завдяки мінімальній травматизації тканин.</p>'

                full: '<p>Найбільші світові маркетплейси завершили модернізацію своїх сортувальних хабів, перетворивши їх на повністю автономні екосистеми, де взагалі немає робочих місць для людей. Величезні приміщення площею в кілька футбольних полів обслуговуються сотнями компактних плоских роботів-платформ.</p><p>Ці пристрої пересуваються підлогою за складними математичними траєкторіями, які безперервно прораховує центральний серверний штучний інтелект. Роботи підзаряджаються прямо під час руху від магнітних ліній у підлозі, що дозволяє їм функціонувати без зупинок на технічне обслуговування.</p><p>Коли вантажівка привозить тисячі нових замовлень, система за допомогою сканерів миттєво розпізнає габарити та вагу кожної коробки. Роботи підхоплюють товари та розвозять їх до потрібних секторів зберігання. Впровадження цієї технології дозволило скоротити час збору одного замовлення з кількох годин до 45 секунд, повністю виключивши помилки сортування.</p>'

                full: '<p>На міжнародній виставці споживчої електроніки розробники продемонстрували першого повноцінного комерційного робота-асистента для дому, виконаного у вигляді витонченого андроїда. Пристрій створено спеціально для повного звільнення людей від щоденної рутинної роботи на кухні.</p><p>Робот оснащений м\'якими силіконовими маніпуляторами з датчиками тиску, що дозволяє їм акуратно тримати крихкі кришталеві келихи, користуватися гострими кухонними ножами та делікатними столовими приборами. ШІ підключається до домашньої мережі, сканує за допомогою вбудованих камер вміст холодильника та самостійно пропонує меню на основі дієтичних уподобань власників.</p><p>Під час демонстрації робот без жодної допомоги почистив овочі, приготував складний соус, підсмажив стейк заданого ступеня прожарки та красиво сервірував стіл. Після завершення трапези андроїд самостійно зібрав брудний посуд, завантажив його в посудомийну машину та протер кухонні поверхні до блиску.</p>'

                full: '<p>Глобальні метеорологічні служби оголосили про повне переведення своїх прогностичних центрів на нові нейромережеві моделі. Традиційні математичні моделі погоди вимагали тижнів обчислень на гігантських суперкомп\'ютерах і часто помилялися через хаотичні зміни в атмосфері. ШІ вирішує це завдання за хвилини.</p><p>Нейромережа була навчена на супутникових знімках, показниках тиску та температурних картах за останні сто п\'ятдесят років. Аналізуючи поточний стан атмосфери, вона здатна знаходити мікроскопічні закономірності та передбачати появу руйнівних ураганів, затяжних посух чи раптових тайфунів з точністю до 95% за тридцять днів до їхнього початку.</p><p>Для аграрного сектора та державних служб з надзвичайних ситуацій це відкриває неймовірні можливості. Фермери можуть заздалегідь коригувати терміни посівної кампанії та збору врожаю, рятуючи культури від заморозків, а міста — вчасно проводити інженерну підготовку до можливих повеней, мінімізуючи людські та економічні втрати.</p>'

                                <h5 class="card-title fw-bold" style="font-size: 1.15rem; line-height: 1.4;">${news.title}</h5>
                                <p class="card-text text-muted small flex-grow-1">${news.short}</p>
                                <div class="border-top pt-2 mt-3 d-flex justify-content-between align-items-center text-muted small">
                                    <span>${news.date}</span>
                                    <button class="btn btn-sm ${btnClass} rounded-pill px-3" onclick="openArticle(${index})">Читати далі</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                allGrid.innerHTML += cardHtml;
                if(news.type === 'ai') {
                    aiGrid.innerHTML += cardHtml;
                } else {
                    robotGrid.innerHTML += cardHtml;
                }
            });
        });
    </script>
</body>
</html>
